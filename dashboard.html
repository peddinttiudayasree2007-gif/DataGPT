<!DOCTYPE html>
<html>
<head>
    <title>DataGPT Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            font-family: Arial;
            margin: 30px;
        }

        .card{
            background:#f5f5f5;
            padding:20px;
            width:250px;
            border-radius:10px;
            margin-bottom:20px;
        }

        canvas{
            max-width:600px;
        }
    </style>
</head>
<body>

<h1>📊 DataGPT Dashboard</h1>

<div class="card">
    <h3>Total Revenue</h3>
    <h2 id="revenue">Loading...</h2>
</div>

<canvas id="regionChart"></canvas>

<script>

async function loadDashboard(){

    const res = await fetch("http://127.0.0.1:8000/dashboard");
    const data = await res.json();

    document.getElementById("revenue").innerText =
        data.total_revenue;

    const labels =
        data.regions.map(x => x.Region);

    const values =
        data.regions.map(x => x.Revenue);

    new Chart(
        document.getElementById("regionChart"),
        {
            type: "bar",
            data:{
                labels: labels,
                datasets:[{
                    label:"Revenue",
                    data: values
                }]
            }
        }
    );
}

loadDashboard();

</script>

</body>
</html>`
